name: Docker Image

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
    paths:
      - "backend/**"
      - "tg_signer/**"
      - "tools/**"
      - "frontend/**"
      - "Dockerfile"
      - "docker/**"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
      - "!docs/**"
      - "!**/*.md"
      - "!.claude/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write  # cleanup-old-runs 删除本工作流历史运行记录

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" pytest-xdist

      - name: Run pytest (parallel)
        run: pytest tests/ -n auto --dist loadgroup -x -q --tb=short --no-header --ignore=tools

      - name: Ruff check (核心新模块硬门槛)
        run: >
          ruff check
          backend/services/telegram
          backend/services/keyword_monitor/rules.py
          backend/services/keyword_monitor/__init__.py
          backend/services/sign_task_failure.py
          backend/services/sign_task_backend.py
          backend/api/routes/batch.py
          backend/api/routes/ops.py
          backend/api/routes/tasks.py
          backend/scheduler
          backend/core/pydantic_compat.py
          tests/test_sign_batch_and_ops.py
          tests/test_legacy_tasks_readonly.py
          tests/test_pydantic_compat_and_scale.py
          --quiet

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests
        working-directory: frontend
        run: npm test

  # main 合并：只跑上面的 test / frontend-test，不构建镜像。
  # 正式镜像仅在推送 v* 标签时构建；dev 保留滚动预发镜像。
  build-and-push:
    needs: [test, frontend-test]
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        # 仅正式 tag 启用 QEMU（ARM）
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/tg-signpulse"
          short_sha="${GITHUB_SHA::12}"

          # 平台：正式 tag 双架构；dev / 手动触发仅 amd64
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> "${GITHUB_OUTPUT}"
          else
            echo "platforms=linux/amd64" >> "${GITHUB_OUTPUT}"
          fi

          # 镜像标签策略：
          # - v* tag：正式发版，一次推送 vX.Y.Z + latest + main + main-<sha>
          # - dev 分支：dev + dev-<sha>
          # - main 分支：不构建（见 job if）
          # - workflow_dispatch：按当前 ref 规则；若在 main 上手动触发则打 main-<sha>
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            {
              echo "tags<<EOF"
              echo "${image}:${GITHUB_REF_NAME}"
              echo "${image}:latest"
              echo "${image}:main"
              echo "${image}:main-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            {
              echo "tags<<EOF"
              echo "${image}:dev"
              echo "${image}:dev-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            # 仅 workflow_dispatch 会走到这里
            {
              echo "tags<<EOF"
              echo "${image}:main-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            {
              echo "tags<<EOF"
              echo "${image}:test-${safe_ref}"
              echo "${image}:test-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

          # 版本号：tag 用 ref 名；否则从 tg_signer/__init__.py 读取 __version__
          # 注意：勿在 YAML run 块内嵌套含引号的 Python heredoc，会导致 workflow 解析失败
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            app_version="${GITHUB_REF_NAME}"
          else
            app_version="$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' tg_signer/__init__.py | head -1)"
            if [[ -z "${app_version}" ]]; then
              app_version="$(sed -n "s/^__version__[[:space:]]*=[[:space:]]*'\([^']*\)'.*/\1/p" tg_signer/__init__.py | head -1)"
            fi
            if [[ -z "${app_version}" ]]; then
              app_version="0.0.0"
            fi
          fi
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.vars.outputs.platforms }}
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            APP_VERSION=${{ steps.vars.outputs.app_version }}
            BUILD_TIME=${{ steps.vars.outputs.build_time }}

  # 每次本工作流运行结束后清理历史：至少保留最近 3 次已完成记录，并删除 3 天前的其余记录。
  # 无 schedule；不依赖构建是否成功/跳过。
  cleanup-old-runs:
    name: Cleanup old workflow runs
    needs: [test, frontend-test, build-and-push]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete old Docker Image runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          WORKFLOW_FILE: docker.yml
          KEEP_MINIMUM: "3"
          RETAIN_DAYS: "3"
          CURRENT_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Listing completed runs for workflow ${WORKFLOW_FILE} (keep>=${KEEP_MINIMUM}, retain_days=${RETAIN_DAYS})"

          # 按时间倒序，最多取 100 条已完成运行
          runs_json="$(
            gh run list \
              --repo "${GH_REPO}" \
              --workflow "${WORKFLOW_FILE}" \
              --status completed \
              --limit 100 \
              --json databaseId,createdAt,displayTitle,conclusion
          )"

          count="$(echo "${runs_json}" | jq 'length')"
          echo "Found ${count} completed run(s)"
          if [[ "${count}" -eq 0 ]]; then
            echo "Nothing to clean"
            exit 0
          fi

          now_epoch="$(date -u +%s)"
          cutoff_epoch="$((now_epoch - RETAIN_DAYS * 86400))"
          deleted=0
          kept=0
          skipped_young=0

          # 索引 0 为最新：前 KEEP_MINIMUM 条始终保留；其余仅当 createdAt 早于 cutoff 时删除
          while IFS=$'\t' read -r run_id created_at; do
            [[ -n "${run_id}" ]] || continue
            # 绝不删除当前这次运行（正常为 in_progress，一般不在 completed 列表里）
            if [[ "${run_id}" == "${CURRENT_RUN_ID}" ]]; then
              echo "Skip current run ${run_id}"
              continue
            fi

            kept=$((kept + 1))
            if [[ "${kept}" -le "${KEEP_MINIMUM}" ]]; then
              echo "Keep recent #${kept}: ${run_id} (${created_at})"
              continue
            fi

            created_epoch="$(date -u -d "${created_at}" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "${created_at}" +%s 2>/dev/null || echo 0)"
            if [[ "${created_epoch}" -eq 0 ]]; then
              echo "Skip unparsable date for run ${run_id}: ${created_at}"
              continue
            fi

            if [[ "${created_epoch}" -ge "${cutoff_epoch}" ]]; then
              echo "Keep (within ${RETAIN_DAYS}d): ${run_id} (${created_at})"
              skipped_young=$((skipped_young + 1))
              continue
            fi

            echo "Delete old run ${run_id} (${created_at})"
            if gh api --method DELETE "repos/${GH_REPO}/actions/runs/${run_id}" >/dev/null; then
              deleted=$((deleted + 1))
            else
              echo "Warning: failed to delete run ${run_id}" >&2
            fi
          done < <(echo "${runs_json}" | jq -r '.[] | "\(.databaseId)\t\(.createdAt)"')

          echo "Cleanup done: deleted=${deleted}, recent_kept_slots=${KEEP_MINIMUM}, young_extra_kept=${skipped_young}"
