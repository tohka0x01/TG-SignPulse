name: Docker Image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "backend/**"
      - "tg_signer/**"
      - "tools/**"
      - "frontend/**"
      - "Dockerfile"
      - "docker/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/tg-signpulse"
          short_sha="${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag 推送：生成版本标签 + latest
            {
              echo "tags<<EOF"
              echo "${image}:${GITHUB_REF_NAME}"
              echo "${image}:latest"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            # main 分支：生成 staging 标签，不覆盖 latest
            {
              echo "tags<<EOF"
              echo "${image}:staging"
              echo "${image}:main-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            # 其他分支：生成 test- 前缀的测试标签
            safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            {
              echo "tags<<EOF"
              echo "${image}:test-${safe_ref}"
              echo "${image}:test-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
