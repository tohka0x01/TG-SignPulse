name: Docker Image

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
    paths:
      - "backend/**"
      - "tg_signer/**"
      - "tools/**"
      - "frontend/**"
      - "Dockerfile"
      - "docker/**"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
      - "!docs/**"
      - "!**/*.md"
      - "!.claude/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" pytest-xdist

      - name: Run pytest (parallel)
        run: pytest tests/ -n auto --dist loadgroup -x -q --tb=short --no-header --ignore=tools

      - name: Ruff check (核心新模块硬门槛)
        run: >
          ruff check
          backend/services/telegram
          backend/services/keyword_monitor/rules.py
          backend/services/keyword_monitor/__init__.py
          backend/services/sign_task_failure.py
          backend/services/sign_task_backend.py
          backend/api/routes/batch.py
          backend/api/routes/ops.py
          backend/api/routes/tasks.py
          backend/scheduler
          backend/core/pydantic_compat.py
          tests/test_sign_batch_and_ops.py
          tests/test_legacy_tasks_readonly.py
          tests/test_pydantic_compat_and_scale.py
          --quiet

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests
        working-directory: frontend
        run: npm test

  build-and-push:
    needs: [test, frontend-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        # 仅 tag 推送时启用 QEMU（ARM 构建需要）
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/tg-signpulse"
          short_sha="${GITHUB_SHA::12}"

          # 计算平台：tag 推送用双平台，分支推送仅 amd64
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> "${GITHUB_OUTPUT}"
          else
            echo "platforms=linux/amd64" >> "${GITHUB_OUTPUT}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag 推送：生成版本标签 + latest
            {
              echo "tags<<EOF"
              echo "${image}:${GITHUB_REF_NAME}"
              echo "${image}:latest"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            # main 分支：生成 latest 标签
            {
              echo "tags<<EOF"
              echo "${image}:latest"
              echo "${image}:main-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            # dev 分支：生成 dev 标签
            {
              echo "tags<<EOF"
              echo "${image}:dev"
              echo "${image}:dev-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            # 其他分支：生成 test- 前缀的测试标签
            safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            {
              echo "tags<<EOF"
              echo "${image}:test-${safe_ref}"
              echo "${image}:test-${short_sha}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

          # 版本号：tag 用 ref 名；否则从 tg_signer/__init__.py 读取 __version__
          # 注意：勿在 YAML run 块内嵌套含引号的 Python heredoc，会导致 workflow 解析失败
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            app_version="${GITHUB_REF_NAME}"
          else
            app_version="$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' tg_signer/__init__.py | head -1)"
            if [[ -z "${app_version}" ]]; then
              app_version="$(sed -n "s/^__version__[[:space:]]*=[[:space:]]*'\([^']*\)'.*/\1/p" tg_signer/__init__.py | head -1)"
            fi
            if [[ -z "${app_version}" ]]; then
              app_version="0.0.0"
            fi
          fi
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.vars.outputs.platforms }}
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            APP_VERSION=${{ steps.vars.outputs.app_version }}
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
